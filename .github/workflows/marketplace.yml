name: Publish to Marketplace

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run compile

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --pat ${{ secrets.VSCE_PAT }}
